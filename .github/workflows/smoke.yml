name: Production smoke test

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * 1-5"

permissions:
  contents: read

jobs:
  smoke:
    name: Verify public deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check health endpoint
        run: curl --fail --show-error --silent --retry 3 --retry-all-errors https://material-event-radar.vercel.app/api/health

      - name: Check application shell
        run: curl --fail --show-error --silent --retry 3 --retry-all-errors https://material-event-radar.vercel.app/ | grep -q "Material Event Radar"

